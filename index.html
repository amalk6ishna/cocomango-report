<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocomango Admin | Daily Reports</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #ffcc00; /* Bright Mango */
            --success: #2ecc71;
            --border: #222222;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 30px;
        }

        h1 { margin: 0; color: var(--accent); letter-spacing: 1px; }
        h2 { font-size: 1.1rem; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1a1a1a;
        }

        .input-row.header-row { font-weight: bold; color: var(--text-muted); border-bottom: 2px solid var(--border); }

        input[type="number"] {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 8px;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            position: sticky;
            bottom: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 10px;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-generate { background: var(--accent); color: black; }
        .btn-download { background: var(--success); color: white; display: none; }

        /* Report Styles */
        #reportOutput {
            margin-top: 30px;
            padding: 20px;
            background: #000;
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: left;
        }

        th { background: #111; color: var(--accent); }
        .highlight { background: #1a1a1a; font-weight: bold; }
        .profit-row { font-size: 1.2rem; color: var(--success); border-top: 2px solid var(--success); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🥭 COCOMANGO</h1>
        <p style="color: var(--text-muted)">Daily Stock & Sales Auditor</p>
    </header>

    <div id="formFields"></div>

    <div class="card">
        <h2>5️⃣ PARCEL INCOME</h2>
        <div class="input-row" style="grid-template-columns: 2fr 2fr;">
            <label>Parcel Charges (₹)</label>
            <input type="number" id="parcelIncome" value="0">
        </div>
    </div>

    <div class="card">
        <h2>6️⃣ EXPENSES</h2>
        <div class="input-row" style="grid-template-columns: 2fr 2fr;"><span>Auto (₹)</span><input type="number" id="expAuto" value="0"></div>
        <div class="input-row" style="grid-template-columns: 2fr 2fr;"><span>Salary (₹)</span><input type="number" id="expSalary" value="0"></div>
        <div class="input-row" style="grid-template-columns: 2fr 2fr;"><span>Other (₹)</span><input type="number" id="expOther" value="0"></div>
    </div>

    <div class="btn-group">
        <button class="btn btn-generate" onclick="calculateReport()">Generate Report</button>
        <button id="dlBtn" class="btn btn-download" onclick="downloadPDF()">Download PDF</button>
    </div>

    <div id="reportOutput"></div>
</div>

<script>
    const products = [
        { id: 'tc300', name: 'Tender Coconut (300ml)', price: 70 },
        { id: 'tc600', name: 'Tender Coconut (600ml)', price: 100 },
        { id: 'mango', name: 'Thick Mango Juice', price: 100 },
        { id: 'coffee', name: 'Cold Coffee', price: 90 },
        { id: 'rose', name: 'Rose Milk', price: 90 },
        { id: 'badam', name: 'Badam Milk', price: 90 },
        { id: 'choco', name: 'Chocolate Milk', price: 90 }
    ];

    const sections = [
        { id: 'open', title: '1️⃣ Morning Opening Stock' },
        { id: 'add', title: '2️⃣ Stock Added Today' },
        { id: 'current', title: '3️⃣ Current Physical Stock' }
    ];

    function init() {
        let html = '';
        sections.forEach(s => {
            html += `<div class="card"><h2>${s.title}</h2><div class="input-row header-row"><div>Product</div><div>Freezer</div><div>Fridge</div></div>`;
            products.forEach(p => {
                html += `<div class="input-row"><div>${p.name}</div>
                    <input type="number" id="${s.id}_fz_${p.id}" value="0">
                    <input type="number" id="${s.id}_fr_${p.id}" value="0">
                </div>`;
            });
            html += `</div>`;
        });

        let staffHtml = `<div class="card"><h2>4️⃣ Staff Consumption</h2>`;
        products.forEach(p => {
            staffHtml += `<div class="input-row" style="grid-template-columns: 3fr 1fr;"><div>${p.name}</div><input type="number" id="staff_${p.id}" value="0"></div>`;
        });
        document.getElementById('formFields').innerHTML = html + staffHtml + `</div>`;
    }

    const getV = (id) => parseInt(document.getElementById(id).value) || 0;

    function calculateReport() {
        let totalRev = 0;
        let report = `<h2>📊 DAILY SALES REPORT - ${new Date().toLocaleDateString()}</h2>`;
        
        // Logical storage for math
        const results = products.map(p => {
            const open = getV(`open_fz_${p.id}`) + getV(`open_fr_${p.id}`);
            const added = getV(`add_fz_${p.id}`) + getV(`add_fr_${p.id}`);
            const current = getV(`current_fz_${p.id}`) + getV(`current_fr_${p.id}`);
            const staff = getV(`staff_${p.id}`);
            const sold = (open + added) - current - staff;
            const revenue = sold * p.price;
            totalRev += revenue;
            return { ...p, open, added, current, staff, sold, revenue };
        });

        const pIncome = getV('parcelIncome');
        const exAuto = getV('expAuto');
        const exSal = getV('expSalary');
        const exOth = getV('expOther');
        const totalExp = exAuto + exSal + exOth;
        const gross = totalRev + pIncome;

        // Generating HTML Tables for the 10 Mandatory Sections
        report += `<h3>1️⃣ Opening Stock</h3><table><tr><th>Product</th><th>Qty</th></tr>` + results.map(r => `<tr><td>${r.name}</td><td>${r.open}</td></tr>`).join('') + `</table>`;
        report += `<h3>2️⃣ Added Stock</h3><table><tr><th>Product</th><th>Qty</th></tr>` + results.map(r => `<tr><td>${r.name}</td><td>${r.added}</td></tr>`).join('') + `</table>`;
        report += `<h3>3️⃣ Total Available</h3><table><tr><th>Product</th><th>Qty</th></tr>` + results.map(r => `<tr><td>${r.name}</td><td>${r.open + r.added}</td></tr>`).join('') + `</table>`;
        report += `<h3>4️⃣ Closing Stock</h3><table><tr><th>Product</th><th>Qty</th></tr>` + results.map(r => `<tr><td>${r.name}</td><td>${r.current}</td></tr>`).join('') + `</table>`;
        report += `<h3>5️⃣ Staff Consumption</h3><table><tr><th>Product</th><th>Qty</th></tr>` + results.map(r => `<tr><td>${r.name}</td><td>${r.staff}</td></tr>`).join('') + `</table>`;
        report += `<h3>6️⃣ Bottles Sold</h3><table><tr><th>Product</th><th>Qty</th></tr>` + results.map(r => `<tr class="highlight"><td>${r.name}</td><td>${r.sold}</td></tr>`).join('') + `</table>`;
        report += `<h3>7️⃣ Sales Revenue</h3><table><tr><th>Product</th><th>Price</th><th>Total</th></tr>` + results.map(r => `<tr><td>${r.name}</td><td>₹${r.price}</td><td>₹${r.revenue}</td></tr>`).join('') + `<tr><th>Total Sales</th><th></th><th>₹${totalRev}</th></tr></table>`;
        report += `<h3>8️⃣ Expenses Summary</h3><table><tr><td>Auto</td><td>₹${exAuto}</td></tr><tr><td>Salary</td><td>₹${exSal}</td></tr><tr><td>Other</td><td>₹${exOth}</td></tr><tr class="highlight"><td>Total Expenses</td><td>₹${totalExp}</td></tr></table>`;
        report += `<h3>9️⃣ Profit Calculation</h3><table><tr><td>Gross (Sales + Parcel)</td><td>₹${gross}</td></tr><tr><td>Expenses</td><td>- ₹${totalExp}</td></tr></table>`;
        report += `<h3>🔟 FINAL SUMMARY</h3><div class="card" style="border: 2px solid var(--accent)">
            <p>Cash Inflow: ₹${gross}</p>
            <p>Cash Outflow: ₹${totalExp}</p>
            <h2 style="margin:0">Net Profit: ₹${gross - totalExp}</h2>
        </div>`;

        const out = document.getElementById('reportOutput');
        out.innerHTML = report;
        out.style.display = 'block';
        document.getElementById('dlBtn').style.display = 'block';
        out.scrollIntoView({ behavior: 'smooth' });
    }

    function downloadPDF() {
        const element = document.getElementById('reportOutput');
        const opt = {
            margin: 10,
            filename: `Cocomango_${new Date().toISOString().slice(0,10)}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, backgroundColor: '#000000' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    init();
</script>
</body>
            </html>
